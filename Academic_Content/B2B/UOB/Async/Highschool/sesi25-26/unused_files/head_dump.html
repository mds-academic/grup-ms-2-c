<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Basics - Nested Condition</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --yellow: #FFE500;
            --blue: #00C6FF;
            --black: #1A1A1A;
            --white: #FFFFFF;
            --bg-light: #E8E8E8;
        }

        body {
            background-color: var(--bg-light);
            background-image: radial-gradient(#bcbcbc 2px, transparent 2px);
            background-size: 30px 30px;
            font-family: 'Fredoka', sans-serif;
            color: var(--black);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* App Container (Landscape 16:9 Simulator) */
        .app-container {
            position: relative; z-index: 10;
            width: 98vw; max-width: 1400px;
            height: 98vh; max-height: 900px;
            display: flex; flex-direction: column;
        }

        /* Header Layout */
        .header {
            display: flex; justify-content: flex-start; align-items: flex-start;
            padding: 30px 50px 10px;
            position: relative;
            width: 100%;
        }
        
        .header img.rg-logo { 
            height: 40px; object-fit: contain; 
            filter: brightness(0); /* Black logo */
            position: relative; z-index: 20; 
        }

        /* Banner Centered at Top */
        .banner-container { 
            position: absolute; top: 25px; left: 0; width: 100%;
            text-align: center; display: flex; flex-direction: column; align-items: center; 
            z-index: 10; pointer-events: none;
        }
        
        .banner-shape {
            background-color: var(--blue);
            padding: 12px 60px;
            border: 4px solid var(--black);
            border-radius: 12px;
            box-shadow: 6px 6px 0px var(--black);
            display: inline-block;
        }
        
        .banner-text { 
            font-size: 28px; font-weight: 700; letter-spacing: 2px; color: var(--white); 
            text-shadow: 2px 2px 0px var(--black), -1px -1px 0px var(--black), 1px -1px 0px var(--black), -1px 1px 0px var(--black), 1px 1px 0px var(--black);
        }
        
        .banner-subtitle {
            background-color: var(--yellow); 
            color: var(--black); 
            padding: 8px 40px; 
            font-size: 16px; font-weight: 700;
            border: 3px solid var(--black);
            border-radius: 20px; 
            margin-top: -15px; 
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 4px 4px 0px var(--black);
            display: inline-block;
        }

        /* Slides Area */
        .slides-area {
            flex: 1; position: relative; margin: 30px 50px 0; perspective: 1200px;
            min-height: 0; 
        }

        .slide {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: none;
